<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie sua conta</title>
</head>

<body>
    <!--Cabeçalho-->
    <header>
        <h1>Crie sua conta</h1>
        <nav>
            <a href="index.html">Voltar para pagína inicial</a>
        </nav>
    </header>

    <!--Formulario de Cadastro-->
    <main>
        <section>
            <form>
                <div>
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" nome="nome" required>
                </div>

                <div>
                    <label for="email">e-mail</label>
                    <input type="email" id="email" nome="email" required>
                </div>

                <div>
                    <label for="senha">senha</label>
                    <input type="password" id="senha" nome="senha" required>
                </div>

                <div>
                    <label>Perfil do aluno:</label>
                    <label>
                        <input type="radio" name="perfil" value="estudante" required>
                        estudante
                    </label>
                    <label>
                        <input type="radio" nome="perfil" value="professor">
                        Professor/Hobbista
                    </label>
                </div>

                <div>
                    <label for="trilha">trilha de interesse:</label>
                    <select id="trilha" name="trilha" required>
                        <option value="">Selecione uma trilha</option>
                        <option value="basica">Robotica básica</option>
                        <option value="ia">Inteligencia Artificial</option>
                        <option value="programação">programação</option>
                    </select>
                </div>

                <button type="submit">Cadastrar</button>
            </form>
        </section>
    </main>

    <!--Rodapé-->
    <footer>
        <p>&copy; 2026 RoboMaker Kits Educacionais.</p>
    </footer>
</body>
</html>
